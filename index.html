<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Фруктовое Слияние — Секретный скин за коллекцию</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
        
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        canvas {
            touch-action: none;
        }

        :root {
            --gold: #ffdd7e;
            --accent-purple: #b87cff;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #1f0c40, #040010);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: starTwinkle 3s infinite alternate; }
        @keyframes starTwinkle { 0% { opacity: 0.1; transform: scale(0.7);} 100% { opacity: 0.9; transform: scale(1.2);} }

        .game-container { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; z-index: 2; }
        .mobile-top-panel { display: none; background: rgba(12,4,28,0.85); backdrop-filter: blur(16px); padding: 8px 16px; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,215,150,0.3); flex-shrink: 0; }
        .top-stat { text-align: center; }
        .top-label { font-size: 9px; color: #bf8eff; }
        .top-value { font-family: 'Fredoka One', cursive; font-size: 22px; color: #ffdd7e; line-height: 1; }
        .top-next { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 40px; }
        .top-next-label { font-size: 10px; color: #6bcb77; }
        .top-next-fruit { font-size: 28px; }

        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 8px; min-height: 0; position: relative; }
        canvas { display: block; border-radius: 36px; box-shadow: 0 20px 35px rgba(0,0,0,0.6); cursor: crosshair; background: #110c23; max-width: 98%; max-height: 100%; width: auto; height: auto; object-fit: contain; }

        .gameover-pane {
            position: absolute;
            inset: 0;
            background: rgba(8, 2, 24, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 20;
        }
        .gameover-pane.active { opacity: 1; pointer-events: all; }
        .gameover-title { font-family: 'Fredoka One', cursive; font-size: 42px; color: #ff6b6b; text-shadow: 0 0 20px #ff0000; }
        .final-score { font-size: 28px; font-weight: bold; color: #ffdb7e; }
        .restart-btn {
            background: linear-gradient(145deg, #ff7b89, #c35eff);
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 12px 30px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 0 #5a2a8a;
        }
        .restart-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 0 #5a2a8a; }

        .mobile-bottom-bar { display: none; background: rgba(12,4,28,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,200,100,0.4); padding: 8px 16px; padding-bottom: max(8px, env(safe-area-inset-bottom)); justify-content: space-between; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        .shop-btn, .case-btn, .collection-btn { background: linear-gradient(135deg, #ffaa44, #ff6b6b); border: none; border-radius: 40px; padding: 8px 12px; color: white; font-family: 'Fredoka One', cursive; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .case-btn { background: linear-gradient(135deg, #9b59b6, #e91e63); }
        .collection-btn { background: linear-gradient(135deg, #2196f3, #00bcd4); }
        .restart-mob-btn { background: linear-gradient(145deg, #ff7b89, #c35eff); border: none; font-family: 'Fredoka One', cursive; font-size: 16px; padding: 8px 16px; border-radius: 40px; color: white; cursor: pointer; box-shadow: 0 3px 0 0 #5a2a8a; }
        .restart-mob-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 0 #5a2a8a; }

        .desktop-panel { display: flex; position: fixed; left: 20px; top: 50%; transform: translateY(-50%); width: 260px; flex-direction: column; gap: 10px; backdrop-filter: blur(12px); z-index: 5; max-height: 95vh; overflow-y: auto; scrollbar-width: thin; }
        .stat-card { background: rgba(20,10,40,0.65); backdrop-filter: blur(14px); border: 1px solid rgba(255,215,150,0.3); border-radius: 32px; padding: 10px; text-align: center; }
        .stat-label { font-family: 'Fredoka One', cursive; font-size: 11px; color: var(--accent-purple); margin-bottom: 4px; }
        .score-value { font-family: 'Fredoka One', cursive; font-size: 38px; color: var(--gold); }
        .best-value { font-family: 'Fredoka One', cursive; font-size: 28px; color: #ffbc6e; }
        .case-card { background: linear-gradient(135deg, rgba(155,89,182,0.3), rgba(233,30,99,0.2)); border: 2px solid rgba(255,200,100,0.5); }
        .case-price { font-size: 20px; color: #ffdd77; }
        .open-case-btn { background: linear-gradient(135deg, #9b59b6, #e91e63); border: none; border-radius: 30px; padding: 6px 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 12px; }
        
        .collection-card { background: rgba(33,150,243,0.2); border: 1px solid rgba(33,150,243,0.4); }
        .collection-progress { font-size: 14px; color: #ffdd77; margin: 5px 0; }

        .shop-drawer, .case-drawer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(135deg, #1a0a30, #0d0520); 
            border-top-left-radius: 32px; 
            border-top-right-radius: 32px; 
            box-shadow: 0 -8px 30px rgba(0,0,0,0.6); 
            z-index: 30; 
            transform: translateY(100%); 
            transition: transform 0.3s; 
            max-height: 65vh; 
            display: flex; 
            flex-direction: column; 
            border-top: 1px solid rgba(255,215,150,0.4);
        }
        
        .collection-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a0a30, #0d0520);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
            z-index: 30;
            transform: translateY(100%);
            transition: transform 0.3s;
            height: 80vh;
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255,215,150,0.4);
        }
        
        .shop-drawer.open, .case-drawer.open, .collection-drawer.open { transform: translateY(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,215,150,0.3); background: rgba(0,0,0,0.3); border-radius: 32px 32px 0 0; flex-shrink: 0; }
        .drawer-title { font-family: 'Fredoka One', cursive; font-size: 18px; color: #ffcc66; }
        .drawer-points { background: rgba(0,0,0,0.5); border-radius: 30px; padding: 4px 12px; color: #ffdd77; font-weight: bold; font-size: 14px; }
        .close-drawer { background: none; border: none; font-size: 28px; color: #ffaa66; cursor: pointer; padding: 0 8px; }
        .drawer-skin-list, .case-result-list { 
            overflow-y: auto; 
            padding: 12px 16px; 
            padding-bottom: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            flex: 1; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 20px 16px;
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        .collection-grid-item {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid rgba(255,215,150,0.2);
            transition: 0.1s;
        }
        .collection-grid-item.collected {
            border-color: #ffcc66;
            background: rgba(255,200,100,0.15);
            box-shadow: 0 0 10px rgba(255,200,100,0.3);
        }
        .collection-grid-emoji { font-size: 48px; }
        .collection-grid-name { font-size: 12px; color: #ffecbb; margin-top: 6px; font-weight: bold; }
        .collection-grid-rarity { font-size: 10px; margin-top: 5px; padding: 3px 8px; border-radius: 20px; display: inline-block; }
        .collection-grid-status { font-size: 18px; margin-top: 5px; }
        .collection-complete-badge { text-align: center; padding: 18px; background: linear-gradient(135deg, gold, #ff6600); border-radius: 30px; margin: 10px; grid-column: span 3; font-weight: bold; animation: glow 1s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px gold; } 50% { box-shadow: 0 0 25px gold; } 100% { box-shadow: 0 0 5px gold; } }
        
        .drawer-skin-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.08); border-radius: 28px; padding: 8px 16px; border: 1px solid rgba(255,215,150,0.2); }
        .drawer-skin-item.active { border-color: #ffcc66; background: rgba(255,200,100,0.15); }
        .drawer-skin-preview { display: flex; align-items: center; gap: 12px; }
        .drawer-skin-emoji { font-size: 30px; }
        .drawer-skin-name { font-size: 13px; font-weight: bold; color: #ffecbb; }
        .drawer-skin-actions { display: flex; gap: 10px; align-items: center; }
        .drawer-buy-btn, .drawer-select-btn { border: none; border-radius: 30px; padding: 5px 12px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .drawer-buy-btn { background: linear-gradient(135deg, #ff7b89, #c35eff); color: white; }
        .drawer-select-btn { background: #4caf50; color: white; }
        .drawer-price { color: #ffdd77; font-weight: bold; font-size: 12px; }
        .drawer-owned { color: #6bcb77; font-size: 18px; }
        
        .case-result-item { text-align: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 30px; margin: 10px; }
        .case-result-emoji { font-size: 70px; }
        .case-result-name { font-size: 18px; font-weight: bold; margin: 8px 0; }
        .case-result-rarity { font-size: 12px; padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .rarity-common { background: #555; color: white; }
        .rarity-rare { background: #4cc9f0; color: #1a1a2e; }
        .rarity-epic { background: #c35eff; color: white; }
        .rarity-legendary { background: #ff6b6b; color: white; text-shadow: 0 0 5px gold; }
        
        .overlay-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 25; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay-blur.active { opacity: 1; pointer-events: auto; }

        @media (min-width: 800px) { .mobile-top-panel, .mobile-bottom-bar { display: none; } .game-container { padding-left: 280px; } .desktop-panel { display: flex; } }
        @media (max-width: 799px) { .desktop-panel { display: none; } .mobile-top-panel { display: flex; } .mobile-bottom-bar { display: flex; } .game-container { padding: 0; } }
        
        .collection-grid::-webkit-scrollbar, .drawer-skin-list::-webkit-scrollbar, .case-result-list::-webkit-scrollbar {
            width: 4px;
        }
        .collection-grid::-webkit-scrollbar-track, .drawer-skin-list::-webkit-scrollbar-track, .case-result-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .collection-grid::-webkit-scrollbar-thumb, .drawer-skin-list::-webkit-scrollbar-thumb, .case-result-list::-webkit-scrollbar-thumb {
            background: #ffaa66;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="stars" id="starfield"></div>

<div class="game-container">
    <div class="mobile-top-panel">
        <div class="top-stat"><div class="top-label">🍬 СЧЁТ</div><div class="top-value" id="mobScoreTop">0</div></div>
        <div class="top-stat"><div class="top-label">🏆 РЕКОРД</div><div class="top-value" id="mobBestTop">0</div></div>
        <div class="top-next"><span class="top-next-label">СЛЕД.</span><span class="top-next-fruit" id="mobNextTop">🍓</span></div>
    </div>

    <div class="canvas-area" id="canvasArea">
        <canvas id="gameCanvas" width="500" height="700"></canvas>
        <div class="gameover-pane" id="gameOverlay">
            <div class="gameover-title">GAME OVER</div>
            <div class="final-score" id="finalScoreSpan">0 очков</div>
            <button class="restart-btn" id="overlayReset">ИГРАТЬ СНОВА</button>
        </div>
    </div>

    <div class="mobile-bottom-bar">
        <button class="shop-btn" id="openShopBtn">🎁 СКИНЫ</button>
        <button class="case-btn" id="openCaseBtn">📦 КЕЙС</button>
        <button class="collection-btn" id="openCollectionBtn">📜 КОЛЛЕКЦИЯ</button>
        <button class="restart-mob-btn" id="mobileResetBtn">↺</button>
    </div>
</div>

<div class="desktop-panel">
    <div class="stat-card"><div class="stat-label">🍬 СЧЁТ</div><div class="score-value" id="mainScore">0</div></div>
    <div class="stat-card"><div class="stat-label">🏆 РЕКОРД</div><div class="best-value" id="mainBest">0</div></div>
    <div class="stat-card"><div class="stat-label">🍎 СЛЕДУЮЩИЙ</div><div class="next-fruit-desktop" id="nextPreviewDesktop" style="font-size:42px;">🍓</div></div>
    <div class="stat-card case-card">
        <div class="stat-label">📦 ЛУТБОКС</div>
        <div class="case-price">500 🍬</div>
        <button class="open-case-btn" id="openCaseBtnDesktop">ОТКРЫТЬ</button>
    </div>
    <div class="stat-card collection-card">
        <div class="stat-label">📜 КОЛЛЕКЦИЯ</div>
        <div class="collection-progress" id="collectionProgress">0/15</div>
        <button class="open-case-btn" id="openCollectionBtnDesktop" style="background: #2196f3;">ПОСМОТРЕТЬ</button>
    </div>
    <div class="stat-card"><div class="stat-label">✨ СКИНЫ</div><div id="desktopSkinPoints" style="color:#ffdd77; font-size:16px;">0 🍬</div></div>
    <button class="restart-mob-btn" id="resetBtnDesktop">⟳ НОВАЯ</button>
</div>

<!-- Магазин скинов -->
<div class="overlay-blur" id="shopOverlay"></div>
<div class="shop-drawer" id="shopDrawer">
    <div class="drawer-header">
        <span class="drawer-title">✨ МАГАЗИН СКИНОВ</span>
        <span class="drawer-points" id="drawerPoints">0 🍬</span>
        <button class="close-drawer" id="closeShopBtn">✕</button>
    </div>
    <div class="drawer-skin-list" id="drawerSkinList"></div>
</div>

<!-- Кейс -->
<div class="overlay-blur" id="caseOverlay"></div>
<div class="case-drawer" id="caseDrawer">
    <div class="drawer-header">
        <span class="drawer-title">📦 ВЫПАЛО:</span>
        <span class="drawer-points" id="casePointsDisplay">0 🍬</span>
        <button class="close-drawer" id="closeCaseBtn">✕</button>
    </div>
    <div class="case-result-list" id="caseResultList"></div>
</div>

<!-- Коллекция -->
<div class="overlay-blur" id="collectionOverlay"></div>
<div class="collection-drawer" id="collectionDrawer">
    <div class="drawer-header">
        <span class="drawer-title">📜 КОЛЛЕКЦИЯ ФРУКТОВ</span>
        <span class="drawer-points" id="collectionPoints"></span>
        <button class="close-drawer" id="closeCollectionBtn">✕</button>
    </div>
    <div class="collection-grid" id="collectionGrid"></div>
</div>

<script>
    (function(){
        // ========== СКИНЫ ==========
        const SKINS = [
            { id: 'classic', name: 'Классика', price: 0, emojis: ['🍓','🍒','🍇','🍋','🍊','🍎','🍑','🍍','🍈','🍉','🎃'], unlocked: true },
            { id: 'veggie', name: 'Овощи', price: 500, emojis: ['🥕','🍅','🥦','🌽','🍆','🥔','🧅','🫑','🥒','🧄','🎃'], unlocked: false },
            { id: 'berry', name: 'Ягоды', price: 800, emojis: ['🍓','🫐','🍒','🍇','🍉','🍑','🍊','🍋','🍎','🍍','🍈'], unlocked: false },
            { id: 'magic', name: 'Магия', price: 1500, emojis: ['⭐','🌙','✨','💎','🔥','💧','🌪️','🌈','🌟','⚡','🎃'], unlocked: false },
            { id: 'rich', name: '💰 Богатый конец', price: 0, emojis: ['💰','💎','👑','💵','🏆','💎','🌟','💎','👑','💎','💰'], unlocked: false, secret: true }
        ];
        
        // Коллекционные фрукты (15 штук)
        const COLLECTION_ITEMS = [
            { id: 'apple', emoji: '🍎', name: 'Яблоко', rarity: 'common' },
            { id: 'orange', emoji: '🍊', name: 'Апельсин', rarity: 'common' },
            { id: 'peach', emoji: '🍑', name: 'Персик', rarity: 'common' },
            { id: 'strawberry', emoji: '🍓', name: 'Клубника', rarity: 'common' },
            { id: 'pineapple', emoji: '🍍', name: 'Ананас', rarity: 'rare' },
            { id: 'melon', emoji: '🍈', name: 'Дыня', rarity: 'rare' },
            { id: 'kiwi', emoji: '🥝', name: 'Киви', rarity: 'rare' },
            { id: 'watermelon', emoji: '🍉', name: 'Арбуз', rarity: 'epic' },
            { id: 'coconut', emoji: '🥥', name: 'Кокос', rarity: 'epic' },
            { id: 'cherry', emoji: '🍒', name: 'Вишня', rarity: 'epic' },
            { id: 'golden', emoji: '👑', name: 'Золотой ананас', rarity: 'legendary' },
            { id: 'star', emoji: '🌟', name: 'Звёздный фрукт', rarity: 'legendary' },
            { id: 'diamond', emoji: '💎', name: 'Алмазное яблоко', rarity: 'legendary' },
            { id: 'rainbow', emoji: '🌈', name: 'Радужный фрукт', rarity: 'legendary' },
            { id: 'moon', emoji: '🌙', name: 'Лунный плод', rarity: 'legendary' }
        ];
        
        const CASE_DROPS = [
            { emoji: '🍎', name: 'Яблоко', rarity: 'common', chance: 0.12, points: 50, collectionId: 'apple' },
            { emoji: '🍊', name: 'Апельсин', rarity: 'common', chance: 0.12, points: 50, collectionId: 'orange' },
            { emoji: '🍑', name: 'Персик', rarity: 'common', chance: 0.12, points: 50, collectionId: 'peach' },
            { emoji: '🍓', name: 'Клубника', rarity: 'common', chance: 0.12, points: 50, collectionId: 'strawberry' },
            { emoji: '🍍', name: 'Ананас', rarity: 'rare', chance: 0.08, points: 150, collectionId: 'pineapple' },
            { emoji: '🍈', name: 'Дыня', rarity: 'rare', chance: 0.08, points: 150, collectionId: 'melon' },
            { emoji: '🥝', name: 'Киви', rarity: 'rare', chance: 0.08, points: 150, collectionId: 'kiwi' },
            { emoji: '🍉', name: 'Арбуз', rarity: 'epic', chance: 0.05, points: 400, collectionId: 'watermelon' },
            { emoji: '🥥', name: 'Кокос', rarity: 'epic', chance: 0.04, points: 400, collectionId: 'coconut' },
            { emoji: '🍒', name: 'Вишня', rarity: 'epic', chance: 0.04, points: 400, collectionId: 'cherry' },
            { emoji: '👑', name: 'Золотой ананас', rarity: 'legendary', chance: 0.005, points: 5000, collectionId: 'golden' },
            { emoji: '🌟', name: 'Звёздный фрукт', rarity: 'legendary', chance: 0.005, points: 5000, collectionId: 'star' },
            { emoji: '💎', name: 'Алмазное яблоко', rarity: 'legendary', chance: 0.004, points: 10000, collectionId: 'diamond' },
            { emoji: '🌈', name: 'Радужный фрукт', rarity: 'legendary', chance: 0.003, points: 10000, collectionId: 'rainbow' },
            { emoji: '🌙', name: 'Лунный плод', rarity: 'legendary', chance: 0.002, points: 10000, collectionId: 'moon' }
        ];
        
        let totalChance = CASE_DROPS.reduce((sum, item) => sum + item.chance, 0);
        if (totalChance < 1) {
            CASE_DROPS.push({ emoji: '🍎', name: 'Яблоко', rarity: 'common', chance: 1 - totalChance, points: 50, collectionId: 'apple' });
        }
        
        let currentSkinId = 'classic';
        let skinPoints = 0;
        let collectedItems = new Set();
        let secretSkinUnlockedFlag = false;
        
        function loadCollectionData() {
            const saved = localStorage.getItem('collectedFruits');
            if (saved) {
                const arr = JSON.parse(saved);
                collectedItems = new Set(arr);
            }
            // Проверяем, разблокирован ли секретный скин при загрузке
            if (isCollectionComplete()) {
                unlockSecretSkin();
            }
        }
        
        function unlockSecretSkin() {
            if (secretSkinUnlockedFlag) return;
            const richSkin = SKINS.find(s => s.id === 'rich');
            if (richSkin && !richSkin.unlocked) {
                richSkin.unlocked = true;
                saveSkinData();
                secretSkinUnlockedFlag = true;
                showUnlockNotification('💰 СЕКРЕТНЫЙ СКИН "БОГАТЫЙ КОНЕЦ" РАЗБЛОКИРОВАН! 💰\n✨ За полную коллекцию! ✨');

        function loadSkinData() {
            const savedSkin = localStorage.getItem('fruitSkin');
            if (savedSkin && SKINS.some(s => s.id === savedSkin)) currentSkinId = savedSkin;
            const savedUnlocks = localStorage.getItem('unlockedSkins');
            if (savedUnlocks) {
                const unlockedArr = JSON.parse(savedUnlocks);
                SKINS.forEach(skin => { if (unlockedArr.includes(skin.id)) skin.unlocked = true; });
            }
            SKINS[0].unlocked = true;
            // Если коллекция полная, но скин почему-то не разблокирован — разблокируем
            if (isCollectionComplete()) {
                const richSkin = SKINS.find(s => s.id === 'rich');
                if (richSkin && !richSkin.unlocked) {
                    richSkin.unlocked = true;
                }
            }
            const savedPoints = localStorage.getItem('skinPoints');
            if (savedPoints) skinPoints = parseInt(savedPoints) || 0;
        }
        
        function saveSkinData() {
            localStorage.setItem('fruitSkin', currentSkinId);
            localStorage.setItem('unlockedSkins', JSON.stringify(SKINS.filter(s => s.unlocked).map(s => s.id)));
            localStorage.setItem('skinPoints', skinPoints);
        }
        
        function getCurrentEmoji(typeIndex) {
            const skin = SKINS.find(s => s.id === currentSkinId);
            if (skin && skin.emojis[typeIndex]) return skin.emojis[typeIndex];
            return SKINS[0].emojis[typeIndex];
        }
        
        function addSkinPoints(amount) {
            skinPoints += amount;
            saveSkinData();
            updateAllUI();
        }
        
        function tryBuySkin(skinId, price) {
            const skin = SKINS.find(s => s.id === skinId);
            if (!skin || skin.unlocked) return false;
            // Секретный скин нельзя купить!
            if (skin.secret) {
                alert('💰 Этот скин нельзя купить! Он открывается только за полную коллекцию фруктов!');
                return false;
            }
            if (skinPoints >= price) {
                skinPoints -= price;
                skin.unlocked = true;
                saveSkinData();
                updateAllUI();
                return true;
            }
            return false;
        }
        
        function selectSkin(skinId) {
            const skin = SKINS.find(s => s.id === skinId);
            if (skin && skin.unlocked) {
                currentSkinId = skinId;
                saveSkinData();
                updateAllUI();
            }
        }

                const item = document.createElement('div');

        function openLootbox() {
            if (skinPoints < 500) {
                alert(`Не хватает очков! У вас ${skinPoints} 🍬, нужно 500`);
                return false;
            }
            skinPoints -= 500;
            saveSkinData();
            updateAllUI();
            
            let rand = Math.random();
            let cumulative = 0;
            let selected = CASE_DROPS[0];
            for (let item of CASE_DROPS) {
                cumulative += item.chance;
                if (rand < cumulative) {
                    selected = item;
                    break;
                }
            }
            skinPoints += selected.points;
            saveSkinData();
            updateAllUI();
            
            if (selected.collectionId) {
                addCollectedItem(selected.collectionId);
            }
            
            showLootboxResult(selected);
            return true;
        }

        function saveFullGameState() { if(!isInitialized) return; sessionStorage.setItem('fruitGameFullState', JSON.stringify({fruits:fruitsArray.map(f=>({type:f.type,x:f.x,y:f.y,vx:f.vx,vy:f.vy,angle:f.angle,angularVel:f.angularVel,mergeLock:f.mergeLock,bornTime:f.bornTime})),currentGameScore,currentFruitToDrop,nextFruitForUI,gameActive,aimX,particles:particles.map(p=>({...p}))})); }
        function restoreFullGameState() { const saved=sessionStorage.getItem('fruitGameFullState'); if(!saved) return false; try { const state=JSON.parse(saved); fruitsArray=[]; for(let f of state.fruits){ const fruit=new Fruit(f.x,f.y,f.type,f.vx,f.vy); fruit.angle=f.angle; fruit.angularVel=f.angularVel; fruit.mergeLock=f.mergeLock; fruit.bornTime=f.bornTime; fruitsArray.push(fruit); } currentGameScore=state.currentGameScore; currentFruitToDrop=state.currentFruitToDrop; nextFruitForUI=state.nextFruitForUI; gameActive=state.gameActive; aimX=state.aimX; particles=state.particles||[]; updateGameUI(); updateAllUI(); return true; } catch(e){return false;} }

        function recalcDimensions() {
            const area=document.getElementById('canvasArea'); if(!area) return;
            const maxWidth=Math.min(area.clientWidth-20,560), maxHeight=Math.min(area.clientHeight-20,window.innerHeight*0.65);
            let ratio=700/500, newW=Math.min(maxWidth,maxHeight/ratio), newH=newW*ratio;
            if(newH>maxHeight){ newH=maxHeight; newW=newH/ratio; }
            canvasWidth=Math.max(300,Math.floor(newW)); canvasHeight=Math.max(480,Math.floor(newH));
            if(canvas){ canvas.width=canvasWidth; canvas.height=canvasHeight; canvas.style.width=`${canvasWidth}px`; canvas.style.height=`${canvasHeight}px`; }
            leftWall=8; rightWall=canvasWidth-8; groundY=canvasHeight-14; dangerZoneY=Math.floor(canvasHeight*0.15);
            let scaleFactor=Math.min(1.2,(canvasWidth/480)*1.0);
            currentFruitsDB=BASE_FRUITS.map((f,idx)=>({...f,radius:Math.max(11,Math.floor(f.radiusBase*(0.7+scaleFactor*0.55)))}));
            for(let f of fruitsArray){ if(currentFruitsDB[f.type]) f.r=currentFruitsDB[f.type].radius; f.x=Math.min(rightWall-f.r,Math.max(leftWall+f.r,f.x)); if(f.y+f.r>groundY) f.y=groundY-f.r; }
        }

        function updateGameUI() { const s=currentGameScore.toString(), b=highScore.toString(); const ms=document.getElementById('mainScore'); if(ms) ms.innerText=s; const mb=document.getElementById('mainBest'); if(mb) mb.innerText=b; const mst=document.getElementById('mobScoreTop'); if(mst) mst.innerText=s; const mbt=document.getElementById('mobBestTop'); if(mbt) mbt.innerText=b; const ne=getCurrentEmoji(nextFruitForUI); const nd=document.getElementById('nextPreviewDesktop'); if(nd) nd.innerHTML=ne; const mn=document.getElementById('mobNextTop'); if(mn) mn.innerHTML=ne; }

        class Fruit { constructor(x,y,typeIdx,velX=0,velY=0){ this.x=x; this.y=y; this.type=typeIdx; this.r=currentFruitsDB[typeIdx]?.radius||20; this.vx=velX; this.vy=velY; this.angle=Math.random()*Math.PI*2; this.angularVel=(Math.random()-0.5)*0.12; this.mergeLock=false; this.bornTime=Date.now(); }

        function addMergeEffect(x,y,fruitType){ for(let i=0;i<20;i++){ let a=Math.random()*Math.PI*2,s=2+Math.random()*5; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.8,size:4+Math.random()*6,color:`hsl(${Math.random()*60+20},80%,65%)`,type:'glow'}); } let nt=fruitType+1; if(nt<currentFruitsDB.length){ let eb=getCurrentEmoji(nt); for(let i=0;i<10;i++) particles.push({x:x+(Math.random()-0.5)*24,y:y+(Math.random()-0.5)*18,vx:(Math.random()-0.5)*3,vy:(Math.random()-2)*1.8,life:0.7,emoji:eb,size:18,type:'emojiSpark'}); } shakePower=10; }
        function handleCollisionsAndMerge(){ let merged=false; for(let i=0;i<fruitsArray.length;i++){ for(let j=i+1;j<fruitsArray.length;j++){ const a=fruitsArray[i],b=fruitsArray[j]; if(a.mergeLock||b.mergeLock) continue; const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),minDist=a.r+b.r; if(dist<minDist){ if(a.type===b.type&&a.type<currentFruitsDB.length-1&&!a.mergeLock&&!b.mergeLock){ a.mergeLock=b.mergeLock=true; const midX=(a.x+b.x)/2,midY=(a.y+b.y)/2; addMergeEffect(midX,midY,a.type); const newType=a.type+1,points=currentFruitsDB[newType].points; currentGameScore+=points; addSkinPoints(points); if(currentGameScore>highScore){ highScore=currentGameScore; localStorage.setItem('fruitsFusionBest',highScore); } updateGameUI(); fruitsArray.splice(j,1); fruitsArray.splice(i,1); let nf=new Fruit(midX,midY-5,newType,(Math.random()-0.5)*1.6,-2.2); fruitsArray.push(nf); merged=true; break; } else { const overlap=minDist-dist,angle=Math.atan2(dy,dx); const pushX=Math.cos(angle)*overlap*0.55,pushY=Math.sin(angle)*overlap*0.55; if(!a.mergeLock){ a.x-=pushX; a.y-=pushY; } if(!b.mergeLock){ b.x+=pushX; b.y+=pushY; } const nx=dx/dist,ny=dy/dist,vrelx=b.vx-a.vx,vrely=b.vy-a.vy,dot=vrelx*nx+vrely*ny; if(dot<0){ const imp=(1+COLLISION_STIFF)*dot/2; if(!a.mergeLock){ a.vx+=imp*nx; a.vy+=imp*ny; } if(!b.mergeLock){ b.vx-=imp*nx; b.vy-=imp*ny; } } a.x=Math.max(leftWall+a.r,Math.min(rightWall-a.r,a.x)); b.x=Math.max(leftWall+b.r,Math.min(rightWall-b.r,b.x)); } } } if(merged) break; } if(merged) handleCollisionsAndMerge(); }
        function updateParticles(){ for(let i=0;i<particles.length;i++){ let p=particles[i]; p.x+=p.vx; p.y+=p.vy; if(p.type!=='emojiSpark') p.vy+=0.2; p.life-=0.025; if(p.life<=0||p.y>canvasHeight+50){ particles.splice(i,1); i--; } } }
        function drawParticles(ctx){ for(let p of particles){ ctx.save(); ctx.globalAlpha=Math.min(1,p.life*1.2); if(p.type==='emojiSpark'){ ctx.font=`${Math.floor(p.size)}px "Segoe UI Emoji"`; ctx.textAlign="center"; ctx.fillText(p.emoji,p.x,p.y); } else { ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fillStyle=p.color||"#ffcc66"; ctx.fill(); } ctx.restore(); } }

        function dropCurrentFruit(posX){ if(!gameActive||shootCooldown||!currentFruitsDB[currentFruitToDrop]) return false; let spawnX=Math.min(rightWall-currentFruitsDB[currentFruitToDrop].radius,Math.max(leftWall+currentFruitsDB[currentFruitToDrop].radius,posX)); let nf=new Fruit(spawnX,28,currentFruitToDrop,(Math.random()-0.5)*0.9,1.4); fruitsArray.push(nf); currentFruitToDrop=nextFruitForUI; let nn=randomFruitIndex(); while(nn===currentFruitToDrop) nn=randomFruitIndex(); nextFruitForUI=nn; updateGameUI(); shootCooldown=true; setTimeout(()=>{shootCooldown=false;},400); return true; }
        function drawBackground(){ if(!ctx) return; const g=ctx.createLinearGradient(0,0,0,canvasHeight); g.addColorStop(0,'#18092e'); g.addColorStop(1,'#2a1245'); ctx.fillStyle=g; ctx.fillRect(0,0,canvasWidth,canvasHeight); ctx.fillStyle='rgba(255,70,90,0.15)'; ctx.fillRect(0,0,canvasWidth,dangerZoneY); ctx.beginPath(); ctx.moveTo(0,dangerZoneY); ctx.lineTo(canvasWidth,dangerZoneY); ctx.strokeStyle='#ff8866'; ctx.lineWidth=2; ctx.setLineDash([8,8]); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='#5d3a6e'; ctx.fillRect(0,groundY-3,canvasWidth,6); ctx.fillStyle='#ffd96630'; ctx.fillRect(0,groundY-1,canvasWidth,3);
            if(gameActive&&!shootCooldown&&currentFruitsDB[currentFruitToDrop]){ let ca=Math.min(rightWall-currentFruitsDB[currentFruitToDrop].radius,Math.max(leftWall+currentFruitsDB[currentFruitToDrop].radius,aimX)); ctx.beginPath(); ctx.moveTo(ca,12); ctx.lineTo(ca,groundY-15); ctx.strokeStyle='#ffdd99'; ctx.lineWidth=3; ctx.setLineDash([6,8]); ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur=20; ctx.shadowColor="#ffaa44"; ctx.font=`${Math.floor(currentFruitsDB[currentFruitToDrop].radius*1.6)}px "Segoe UI Emoji"`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.shadowBlur=15; ctx.shadowColor="#ff9900"; ctx.fillStyle="#ffffff"; ctx.fillText(getCurrentEmoji(currentFruitToDrop),ca,32); ctx.shadowBlur=0; ctx.lineWidth=1.5; ctx.strokeStyle="#ffcc66"; ctx.strokeText(getCurrentEmoji(currentFruitToDrop),ca,32); if(isPointerDown){ ctx.beginPath(); ctx.arc(ca,32,currentFruitsDB[currentFruitToDrop].radius+6,0,Math.PI*2); ctx.strokeStyle='#ffaa55'; ctx.lineWidth=3; ctx.setLineDash([2,4]); ctx.stroke(); ctx.beginPath(); ctx.arc(ca,32,currentFruitsDB[currentFruitToDrop].radius+2,0,Math.PI*2); ctx.strokeStyle='#ffeeaa'; ctx.lineWidth=2; ctx.stroke(); ctx.setLineDash([]); } } }
        function animate(){ if(!canvas||!ctx) return; ctx.clearRect(0,0,canvasWidth,canvasHeight); drawBackground(); if(gameActive){ for(let f of fruitsArray) f.update(); for(let i=0;i<3;i++) handleCollisionsAndMerge(); for(let f of fruitsArray){ f.x=Math.min(rightWall-f.r,Math.max(leftWall+f.r,f.x)); if(f.y+f.r>groundY) f.y=groundY-f.r; } checkGameOver(); if(gameActive) saveFullGameState(); } for(let f of fruitsArray) f.draw(ctx); drawParticles(ctx); updateParticles(); if(shakePower>0){ let ox=(Math.random()-0.5)*shakePower,oy=(Math.random()-0.5)*shakePower*0.7; canvas.style.transform=`translate(${ox}px,${oy}px)`; shakePower*=0.85; if(shakePower<0.3) shakePower=0; } else canvas.style.transform='translate(0px,0px)'; requestAnimationFrame(animate); }
        function getCanvasCoord(cx){ if(!canvas) return canvasWidth/2; const r=canvas.getBoundingClientRect(); if(r.width===0) return canvasWidth/2; let raw=(cx-r.left)*(canvasWidth/r.width); if(currentFruitToDrop!==undefined&&currentFruitsDB[currentFruitToDrop]) return Math.min(rightWall-currentFruitsDB[currentFruitToDrop].radius,Math.max(leftWall+currentFruitsDB[currentFruitToDrop].radius,raw)); return Math.min(rightWall-20,Math.max(leftWall+20,raw)); }
        function handleResize(){ if(resizeTimeout) clearTimeout(resizeTimeout); resizeTimeout=setTimeout(()=>{ saveFullGameState(); recalcDimensions(); if(!restoreFullGameState()){ const p=generateFruitPair(); currentFruitToDrop=p.current; nextFruitForUI=p.next; } updateGameUI(); updateAllUI(); aimX=Math.min(rightWall-(currentFruitsDB[currentFruitToDrop]?.radius||15),Math.max(leftWall+(currentFruitsDB[currentFruitToDrop]?.radius||15),aimX)); shootCooldown=false; },100); }
        function initEvents(){ if(!canvas) return; canvas.addEventListener('pointermove',e=>{if(gameActive) aimX=getCanvasCoord(e.clientX);}); canvas.addEventListener('pointerdown',e=>{if(gameActive&&!shootCooldown){e.preventDefault(); isPointerDown=true; aimX=getCanvasCoord(e.clientX);}}); canvas.addEventListener('pointerup',e=>{if(gameActive&&!shootCooldown&&isPointerDown){e.preventDefault(); dropCurrentFruit(aimX);} isPointerDown=false;}); canvas.addEventListener('pointercancel',()=>{isPointerDown=false;}); canvas.addEventListener('contextmenu',e=>e.preventDefault()); window.addEventListener('resize',handleResize); window.addEventListener('orientationchange',handleResize); document.getElementById('resetBtnDesktop')?.addEventListener('click',()=>restartGame()); document.getElementById('overlayReset')?.addEventListener('click',()=>restartGame()); document.getElementById('mobileResetBtn')?.addEventListener('click',()=>restartGame()); document.getElementById('openShopBtn')?.addEventListener('click',()=>openDrawer()); document.getElementById('closeShopBtn')?.addEventListener('click',()=>closeDrawer()); document.getElementById('shopOverlay')?.addEventListener('click',()=>closeDrawer()); document.getElementById('openCaseBtn')?.addEventListener('click',()=>openLootbox()); document.getElementById('openCaseBtnDesktop')?.addEventListener('click',()=>openLootbox()); document.getElementById('closeCaseBtn')?.addEventListener('click',()=>closeCaseDrawer()); document.getElementById('caseOverlay')?.addEventListener('click',()=>closeCaseDrawer()); document.getElementById('openCollectionBtn')?.addEventListener('click',()=>openCollectionDrawer()); document.getElementById('openCollectionBtnDesktop')?.addEventListener('click',()=>openCollectionDrawer()); document.getElementById('closeCollectionBtn')?.addEventListener('click',()=>closeCollectionDrawer()); document.getElementById('collectionOverlay')?.addEventListener('click',()=>closeCollectionDrawer()); }
        
        function startGame(){ loadSkinData(); loadCollectionData(); if(!canvas||!ctx){console.error("Canvas not found"); return;} recalcDimensions(); initEvents(); if(!restoreFullGameState()){ const p=generateFruitPair(); currentFruitToDrop=p.current; nextFruitForUI=p.next; fruitsArray=[]; particles=[]; currentGameScore=0; gameActive=true; } shootCooldown=false; updateGameUI(); updateAllUI(); updateCollectionUI(); aimX=canvasWidth/2; isInitialized=true; animate(); for(let i=0;i<90;i++){ let s=document.createElement('div'); s.classList.add('star'); s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.width=s.style.height=(Math.random()*3+1)+'px'; s.style.animationDuration=1.5+Math.random()*4+'s'; s.style.animationDelay=Math.random()*5+'s'; document.getElementById('starfield')?.appendChild(s); } }
        if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',startGame); else startGame();
    })();
</script>
